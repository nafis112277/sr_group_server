<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SR Group Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0e17;
      color: #fffffe;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      width: 100%;
      background: #1a1a2e;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff8906, #f25f4c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #a7a9be; margin-bottom: 30px; font-size: 1.1rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: #0f0e17;
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid #2d2d44;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-number { font-size: 2.8rem; font-weight: bold; color: #ff8906; }
    .stat-label { color: #a7a9be; margin-top: 8px; }
    .skills-section {
      background: #0f0e17;
      padding: 25px;
      border-radius: 16px;
      border: 1px solid #2d2d44;
    }
    .skills-section h2 {
      color: #fffffe;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .skill-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d44;
    }
    .skill-item:last-child { border-bottom: none; }
    .skill-name { font-weight: 500; }
    .skill-level {
      background: #2d2d44;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      color: #ff8906;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #a7a9be;
    }
    .error {
      color: #f25f4c;
      text-align: center;
      padding: 20px;
    }
    .footer {
      margin-top: 30px;
      text-align: center;
      color: #a7a9be;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>?? SR Group Assistant</h1>
    <p class="subtitle">Your personal knowledge & project dashboard</p>
    
    <div id="dashboardContent">
      <div class="loading">? Loading your data...</div>
    </div>
    
    <div class="footer">
      Powered by Neon PostgreSQL & Render
    </div>
  </div>

  <script>
    // API URL - ???? ????? (??? ???????)
    const API_URL = '';

    async function loadDashboard() {
      const content = document.getElementById('dashboardContent');
      
      try {
        // ?????????? ???? ???
        const dashboardRes = await fetch(`${API_URL}/api/dashboard`);
        if (!dashboardRes.ok) throw new Error('Dashboard API failed');
        const dashboardData = await dashboardRes.json();
        
        // Skills ???? ???
        const skillsRes = await fetch(`${API_URL}/api/skills`);
        if (!skillsRes.ok) throw new Error('Skills API failed');
        const skillsData = await skillsRes.json();

        // HTML ???? ???
        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${dashboardData.total_skills || 0}</div>
              <div class="stat-label">?? Total Skills</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${dashboardData.active_projects || 0}</div>
              <div class="stat-label">?? Active Projects</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${dashboardData.active_goals || 0}</div>
              <div class="stat-label">?? Active Goals</div>
            </div>
          </div>
          
          <div class="skills-section">
            <h2>?? Your Skills</h2>
            ${skillsData.length === 0 ? '<p style="color: #a7a9be;">No skills added yet.</p>' : 
              skillsData.map(skill => `
                <div class="skill-item">
                  <span class="skill-name">${skill.skill_name}</span>
                  <span class="skill-level">${skill.proficiency_level || 0}%</span>
                </div>
              `).join('')
            }
          </div>
        `;
      } catch (error) {
        content.innerHTML = `<div class="error">? Failed to load data. Please check your connection.</div>`;
        console.error('Error loading dashboard:', error);
      }
    }

    // ??? ??? ??? ???? ???
    loadDashboard();
  </script>
</body>
</html>
